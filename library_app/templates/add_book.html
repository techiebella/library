{% extends 'admin_navbar.html' %}
{% load static %}

{% block title %}Add New Book | Library Management System{% endblock %}

{% block css %}
<style>
    .form-card {
        max-width: 700px;
        margin: 40px auto;
        padding: 30px;
        border-radius: 15px;
        background: #ffffff;
        box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
    }
    label {
        font-weight: 600;
        margin-bottom: 6px;
    }
</style>
{% endblock %}

{% block body %}
<div class="container">

    <div class="form-card">
        <h3 class="text-center mb-4 fw-bold">
            📚 Add New Book
        </h3>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Book Name</label>
                <input type="text" class="form-control" name="name" placeholder="Enter book name" required>
            </div>

            <div class="mb-3">
                <label>Author Name</label>
                <input type="text" class="form-control" name="author" placeholder="Enter author's name" required>
            </div>

            <div class="mb-3">
                <label>ISBN Number</label>
                <input type="number" class="form-control" name="isbn" placeholder="Enter ISBN number" required>
            </div>

            <div class="mb-3">
                <label>Category</label>
                <input type="text" class="form-control" name="category" placeholder="Enter category" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-3">
                Add Book
            </button>
        </form>
    </div>

</div>
{% endblock %}

{% block js %}
<script>
    {% if alert %}
        Swal.fire({
            icon: "success",
            title: "Book added successfully!",
            confirmButtonColor: "#0d6efd"
        }).then(() => {
            document.location = "/view_books"
        })
    {% endif %}
</script>

<!-- SweetAlert CDN -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
{% endblock %}
