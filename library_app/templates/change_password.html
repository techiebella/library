{% extends 'student_navbar.html' %}
{% load static %}

{% block title %}Change Password{% endblock %}

{% block css %}
<style>
    .password-card {
        max-width: 600px;
        margin: 50px auto;
        padding: 30px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .password-card h3 {
        font-weight: 700;
        margin-bottom: 25px;
        text-align: center;
    }
    label {
        font-weight: 600;
    }
</style>
{% endblock %}

{% block body %}
<div class="password-card">
    <h3> Change Password</h3>

    <form method="POST" name="change_password" onsubmit="return checkPassword()">
        {% csrf_token %}

        <div class="mb-3">
            <label>Username</label>
            <input type="text" class="form-control" name="username" value="{{ request.user }}" readonly>
        </div>

        <div class="mb-3">
            <label>Current Password</label>
            <input type="password" class="form-control" name="current_password" placeholder="Enter current password" required>
        </div>

        <div class="mb-3">
            <label>New Password</label>
            <input type="password" class="form-control" name="new_password" placeholder="Enter new password" required>
        </div>

        <div class="mb-3">
            <label>Confirm Password</label>
            <input type="password" class="form-control" name="confirm_password" placeholder="Confirm new password" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-3">Update Password</button>
    </form>
</div>
{% endblock %}

{% block js %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    function checkPassword() {
        const newPass = document.change_password.new_password.value;
        const confirmPass = document.change_password.confirm_password.value;

        if (newPass !== confirmPass) {
            Swal.fire({
                icon: 'error',
                title: 'Oops...',
                text: 'New Password and Confirm Password do not match!',
                confirmButtonColor: '#0d6efd'
            });
            document.change_password.confirm_password.focus();
            return false;
        }
        return true;
    }

    {% if alert %}
        Swal.fire({
            icon: 'success',
            title: 'Password Updated!',
            text: 'You will be logged out to login with new password.',
            confirmButtonColor: '#0d6efd'
        }).then(() => {
            window.location.href = "/logout";
        });
    {% endif %}

    {% if currpasswrong %}
        Swal.fire({
            icon: 'error',
            title: 'Incorrect Password!',
            text: 'Current password is wrong. Please try again.',
            confirmButtonColor: '#0d6efd'
        }).then(() => {
            window.location.href = "/change_password";
        });
    {% endif %}
</script>
{% endblock %}
