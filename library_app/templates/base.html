{% load static %}

<!doctype html>
<html lang="en">

<head>

  <meta charset="utf-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">


  <title>
    {% block title %}Library Management System{% endblock %}
  </title>



  <!-- Bootstrap -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


  <!-- Bootstrap Icons -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">



  <style>
    :root {

      --primary: #059669;

      --secondary: #d97706;

      --dark: #111827;

      --bg: #f8fafc;

    }





    body {

      margin: 0;

      background: var(--bg);

      font-family: 'Segoe UI', sans-serif;

    }






    /* ================= NAVBAR ================= */



    .library-navbar {


      background: var(--dark);


      padding: 14px 30px;


      box-shadow:
        0 5px 20px rgba(0, 0, 0, .15);


      position: sticky;


      top: 0;


      z-index: 1000;


    }






    /* Brand */


    .navbar-brand {


      color: white !important;


      font-size: 26px;


      font-weight: 800;


      text-decoration: none;


    }



    .navbar-brand i {


      color: var(--primary);


      margin-right: 5px;


    }



    .navbar-brand span {


      color: var(--secondary);


    }







    /* Links */


    .nav-link {


      color: #e5e7eb !important;


      margin: 0 10px;


      font-weight: 600;


      transition: .3s;


    }



    .nav-link:hover {


      color: #34d399 !important;


    }



    .nav-link i {


      margin-right: 5px;


    }







    /* Register Button */



    .register-btn {


      background: var(--primary);


      color: white !important;


      padding: 9px 22px;


      border-radius: 25px;


      text-decoration: none;


      font-weight: 600;


      transition: .3s;


      display: inline-block;


    }



    .register-btn:hover {


      background: #047857;


      transform: translateY(-3px);


    }






    /* Mobile Toggle */


    .navbar-toggler {


      border: 1px solid rgba(255, 255, 255, .3);


    }



    .navbar-toggler:focus {


      box-shadow: none;


    }



    .navbar-toggler-icon {


      filter:

        invert(1);


    }







    /* Content */


    main {


      min-height: calc(100vh - 70px);


    }







    /* Mobile */


    @media(max-width:991px) {



      .library-navbar {


        padding: 15px;


      }



      .nav-link {


        margin: 10px 0;


      }



      .register-btn {


        margin-top: 10px;


      }



    }
  </style>



  {% block css %}

  {% endblock %}


</head>




<body>




  <!-- ================= NAVBAR ================= -->


  <nav class="navbar navbar-expand-lg library-navbar">


    <div class="container">





      <!-- Logo -->


      <a class="navbar-brand" href="{% url 'index' %}">


        <i class="bi bi-book-half"></i>

        Library<span>Hub</span>


      </a>






      <!-- Mobile Button -->


      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">


        <span class="navbar-toggler-icon"></span>


      </button>







      <!-- Menu -->


      <div class="collapse navbar-collapse" id="navbarNav">


        <ul class="navbar-nav ms-auto align-items-lg-center">





          <li class="nav-item">


            <a class="nav-link" href="{% url 'index' %}">


              <i class="bi bi-house-door"></i>

              Home


            </a>


          </li>







          <li class="nav-item">


            <a class="nav-link" href="{% url 'student_login' %}">


              <i class="bi bi-person"></i>

              Student Login


            </a>


          </li>







          <li class="nav-item">


            <a class="nav-link" href="{% url 'admin_login' %}">


              <i class="bi bi-shield-lock"></i>

              Admin Login


            </a>


          </li>







          <li class="nav-item ms-lg-3">


            <a class="register-btn" href="{% url 'student_registration' %}">


              <i class="bi bi-person-plus"></i>

              Register


            </a>


          </li>





        </ul>



      </div>



    </div>



  </nav>






  <!-- ================= CONTENT ================= -->


  <main>


    {% block body %}

    {% endblock %}


  </main>







  <!-- Bootstrap JS -->


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>



  {% block js %}

  {% endblock %}



</body>

</html>
