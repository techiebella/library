{% extends 'basic.html' %}
{% load static %}

{% block title %}Student Registration{% endblock %}

{% block css %}
<style>
    .register-card {
        max-width: 600px;
        margin: 60px auto;
        padding: 40px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .register-card h2 {
        font-weight: 700;
        text-align: center;
        margin-bottom: 30px;
    }

    label {
        font-weight: 600;
    }

    .btn-register {
        width: 100%;
        margin-top: 20px;
    }
</style>
{% endblock %}

{% block body %}
<div class="register-card">
    <h2> Student Registration</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="mb-3">
            <label>Username</label>
            <input type="text" class="form-control" name="username" placeholder="Enter Username" required>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label>First Name</label>
                <input type="text" class="form-control" name="first_name" placeholder="Enter First Name" required>
            </div>
            <div class="col-md-6">
                <label>Last Name</label>
                <input type="text" class="form-control" name="last_name" placeholder="Enter Last Name" required>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label>Email</label>
                <input type="email" class="form-control" name="email" placeholder="Enter Email" required>
            </div>
            <div class="col-md-6">
                <label>Mobile Number</label>
                <input type="number" class="form-control" name="phone" placeholder="Enter Mobile Number" required>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label>Branch Name</label>
                <input type="text" class="form-control" name="branch" placeholder="Enter Branch Name" required>
            </div>
            <div class="col-md-6">
                <label>Class Name</label>
                <input type="text" class="form-control" name="classroom" placeholder="Enter Class Name" required>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label>Roll Number</label>
                <input type="text" class="form-control" name="roll_no" placeholder="Enter Roll Number" required>
            </div>
            <div class="col-md-6">
                <label>Student Image</label>
                <input type="file" class="form-control" name="image" required>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label>Password</label>
                <input type="password" class="form-control" name="password" placeholder="Enter Password" required>
            </div>
            <div class="col-md-6">
                <label>Confirm Password</label>
                <input type="password" class="form-control" name="confirm_password" placeholder="Confirm Password" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-register">Register As Student</button>
    </form>
</div>
{% endblock %}

{% block js %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    {% if alert %}
        Swal.fire({
            icon: 'success',
            title: 'Registration Successful',
            text: 'You can now login as a student.',
            confirmButtonColor: '#0d6efd'
        }).then(() => {
            window.location.href = "/student_login";
        });
    {% endif %}
</script>
{% endblock %}
