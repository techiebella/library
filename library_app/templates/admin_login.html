{% extends 'basic.html' %}
{% load static %}

{% block title %}Admin Login | Library Management System{% endblock %}

{% block css %}
<style>
    .login-card {
        max-width: 420px;
        margin: 60px auto;
        padding: 35px;
        background: #ffffff;
        border-radius: 15px;
        box-shadow: 0px 4px 20px rgba(0,0,0,0.1);
    }
    .login-card h2 {
        font-weight: 700;
    }
    label {
        font-weight: 600;
        margin-bottom: 6px;
    }
</style>
{% endblock %}

{% block body %}
<div class="container">

    <div class="login-card">
        <h2 class="text-center mb-3"> Admin Login</h2>
        <p class="text-muted mb-4 text-center" style="font-size: 14px;">
            Only administrators are allowed to log in here.
        </p>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Username</label>
                <input type="text" class="form-control" name="username" placeholder="Enter Username" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" class="form-control" name="password" placeholder="Enter Password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-2">
                Login
            </button>
        </form>
    </div>

</div>
{% endblock %}

{% block js %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    {% if alert %}
        Swal.fire({
            icon: "error",
            title: "Invalid Username or Password",
            text: "Please try again.",
            confirmButtonColor: "#0d6efd"
        }).then(() => {
            window.location.href = "/admin_login";
        });
    {% endif %}
</script>
{% endblock %}
