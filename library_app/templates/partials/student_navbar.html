{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}Student Panel{% endblock %}
    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">


    <style>
        :root {
            --primary: #059669;
            --secondary: #d97706;
            --dark: #111827;
            --bg: #f8fafc;
            --white: #ffffff;
        }


        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Segoe UI', sans-serif;
        }


        /* Navbar */

        .student-navbar {

            background: var(--dark);
            padding: 14px 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);

        }


        .brand {

            color: white;
            font-size: 22px;
            font-weight: 700;
            text-decoration: none;

        }


        .brand span {

            color: var(--secondary);

        }


        .nav-link {

            color: #e5e7eb !important;
            margin: 0 8px;
            font-weight: 500;
            transition: .3s;

        }


        .nav-link:hover {

            color: #34d399 !important;

        }



        .nav-link i {

            margin-right: 5px;

        }



        /* Profile Button */

        .profile-btn {

            border: 1px solid var(--primary);
            color: white;
            padding: 7px 15px;
            border-radius: 25px;
            text-decoration: none;
            transition: .3s;

        }


        .profile-btn:hover {

            background: var(--primary);
            color: white;

        }



        /* Logout */

        .logout-btn {

            background: var(--secondary);
            color: white !important;
            border-radius: 25px;
            padding: 8px 18px !important;

        }


        .logout-btn:hover {

            background: #b45309;
            color: white !important;

        }



        /* Page Container */

        .page-container {

            padding: 30px;

        }



        /* Mobile */

        @media(max-width:991px) {

            .student-navbar {

                padding: 15px;

            }


            .nav-link {

                margin: 8px 0;

            }

        }
    </style>


    {% block css %}

    {% endblock %}

</head>


<body>


    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg student-navbar">


        <div class="container-fluid">


            <a class="brand" href="{% url 'student_dashboard' %}">

                <i class="bi bi-book-half"></i>
                Library<span>Hub</span>

            </a>



            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse"
                data-bs-target="#studentMenu">

                <span class="navbar-toggler-icon"></span>

            </button>



            <div class="collapse navbar-collapse" id="studentMenu">


                <ul class="navbar-nav ms-auto align-items-lg-center">


                    <li class="nav-item">

                        <a class="nav-link" href="{% url 'student_dashboard' %}">

                            <i class="bi bi-speedometer2"></i>
                            Dashboard

                        </a>

                    </li>



                    <li class="nav-item">

                        <a class="nav-link" href="{% url 'student_view_books' %}">

                            <i class="bi bi-search"></i>
                            Search Books

                        </a>

                    </li>




                    <li class="nav-item">

                        <a class="nav-link" href="{% url 'student_issued_books' %}">

                            <i class="bi bi-journal-bookmark"></i>
                            My Books

                        </a>

                    </li>



                    <li class="nav-item">

                        <a class="nav-link" href="{% url 'profile' %}">

                            <i class="bi bi-person-circle"></i>
                            Profile

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link" href="{% url 'change_password' %}">

                            <i class="bi bi-key"></i>
                            Change Password

                        </a>

                    </li>



                    <li class="nav-item ms-lg-3">

                        <a class="nav-link logout-btn" href="{% url 'logout' %}">

                            <i class="bi bi-box-arrow-right"></i>
                            Logout

                        </a>

                    </li>


                </ul>


            </div>


        </div>


    </nav>



    <!-- Main Content -->

    <div class="page-container">


        {% block body %}


        {% endblock %}


    </div>



    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
